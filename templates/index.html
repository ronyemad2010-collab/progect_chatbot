<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Nexora Chat</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4a90e2, #6a11cb);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-container {
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow: hidden;
}

.chat-header {
    background: #4a90e2;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.user {
    align-self: flex-end;
    background: #4a90e2;
    color: white;
    padding: 10px;
    border-radius: 15px 15px 0 15px;
    margin: 5px;
    max-width: 70%;
}

.bot {
    align-self: flex-start;
    background: #eee;
    padding: 10px;
    border-radius: 15px 15px 15px 0;
    margin: 5px;
    max-width: 70%;
}

.chat-input {
    display: flex;
    border-top: 1px solid #ddd;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

.chat-input button {
    background: #4a90e2;
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
}

.chat-input button:hover {
    background: #357ABD;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">💬 Nexora Support</div>

    <div class="chat-box" id="chat"></div>

    <div class="chat-input">
        <input id="msg" placeholder="اكتب رسالتك...">
        <button onclick="send()">إرسال</button>
    </div>
</div>

<script>
async function send() {
    let input = document.getElementById("msg");
    let message = input.value;

    if (message.trim() === "") return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class="user">${message}</div>`;

    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    let data = await res.json();

    chat.innerHTML += `<div class="bot">${data.reply}</div>`;

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
